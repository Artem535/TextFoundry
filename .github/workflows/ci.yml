name: CI

on:
  push:
    branches: ["main", "devel", "devel-qt"]
  pull_request:
    branches: ["main", "devel", "devel-qt"]

permissions:
  contents: read

env:
  APPIMAGE_EXTRACT_AND_RUN: "1"
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.cache/vcpkg/archives
  VCPKG_DOWNLOADS: ${{ github.workspace }}/.cache/vcpkg/downloads
  VCPKG_INSTALL_OPTIONS: --debug
  VCPKG_COMMIT: aa2d37682e3318d93aef87efa7b0e88e81cd3d59
  ECM_VERSION: 6.23.0

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            qt_version: 6.10.2
            qt_component: qt.qt6.6102.linux_gcc_64
            qt_install_dir: gcc_64
            appimage_artifact_name: textfoundry-linux-appimage
            rpm_artifact_name: textfoundry-linux-rpm
          - os: macos-latest
            qt_version: 6.10.2
            qt_arch: clang_64
            qt_host: mac
            qt_target: desktop
            artifact_name: textfoundry-macos-dmg
          - os: windows-latest
            qt_version: 6.10.2
            qt_arch: win64_msvc2022_64
            qt_host: windows
            qt_target: desktop
            artifact_name: textfoundry-windows-installer

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            curl \
            git \
            pkg-config \
            file \
            patchelf \
            rpm \
            wget \
            libfuse2 \
            libgl1-mesa-dev \
            libglx-mesa0 \
            mesa-common-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxext-dev \
            libxrender-dev \
            libxi-dev \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-shm0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-client0 \
            libwayland-cursor0 \
            libwayland-egl1 \
            libdbus-1-3

      - name: Restore Qt cache (Linux)
        if: runner.os == 'Linux'
        id: cache-qt-linux
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/Qt/${{ matrix.qt_version }}/${{ matrix.qt_install_dir }}
          key: ${{ runner.os }}-qt-${{ matrix.qt_version }}-${{ matrix.qt_install_dir }}

      - name: Install Qt (Windows/macOS)
        if: runner.os == 'Windows' || runner.os == 'macOS'
        uses: jurplel/install-qt-action@v4
        with:
          aqtversion: '==3.3.*'
          version: ${{ matrix.qt_version }}
          host: ${{ matrix.qt_host }}
          target: ${{ matrix.qt_target }}
          arch: ${{ matrix.qt_arch }}
          cache: true

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Export Qt environment (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "Qt6_DIR=${QT_ROOT_DIR}/lib/cmake/Qt6" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=${QT_ROOT_DIR}${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}" >> "$GITHUB_ENV"
          echo "${QT_ROOT_DIR}/bin" >> "$GITHUB_PATH"

      - name: Install Qt (Linux official installer)
        if: runner.os == 'Linux' && steps.cache-qt-linux.outputs.cache-hit != 'true'
        env:
          QT_EMAIL: ${{ secrets.QT_EMAIL }}
          QT_PW: ${{ secrets.QT_PW }}
        run: |
          if [ -z "${QT_EMAIL:-}" ] || [ -z "${QT_PW:-}" ]; then
            echo "QT_EMAIL or QT_PW secret is not configured" >&2
            exit 1
          fi
          curl -L -O https://download.qt.io/official_releases/online_installers/qt-online-installer-linux-x64-online.run
          chmod +x qt-online-installer-linux-x64-online.run
          ./qt-online-installer-linux-x64-online.run \
            --root "${{ github.workspace }}/Qt" \
            --accept-licenses \
            --accept-obligations \
            --default-answer \
            --confirm-command \
            --email "$QT_EMAIL" \
            --pw "$QT_PW" \
            --auto-answer "OperationDoesNotExistError=Ignore,OverwriteTargetDirectory=No,stopProcessesForUpdates=Ignore,installationErrorWithCancel=Ignore,installationErrorWithIgnore=Ignore,AssociateCommonFiletypes=No,telemetry-question=No" \
            install "${{ matrix.qt_component }}"

      - name: Export Qt environment (Linux)
        if: runner.os == 'Linux'
        run: |
          echo "Qt6_DIR=${{ github.workspace }}/Qt/${{ matrix.qt_version }}/${{ matrix.qt_install_dir }}/lib/cmake/Qt6" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=${{ github.workspace }}/Qt/${{ matrix.qt_version }}/${{ matrix.qt_install_dir }}${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}" >> "$GITHUB_ENV"
          echo "${{ github.workspace }}/Qt/${{ matrix.qt_version }}/${{ matrix.qt_install_dir }}/bin" >> "$GITHUB_PATH"

      - name: Save Qt cache (Linux)
        if: runner.os == 'Linux' && steps.cache-qt-linux.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/Qt/${{ matrix.qt_version }}/${{ matrix.qt_install_dir }}
          key: ${{ steps.cache-qt-linux.outputs.cache-primary-key }}

      - name: Restore vcpkg binary cache
        id: cache-vcpkg-binary
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
            ${{ env.VCPKG_DOWNLOADS }}
          key: ${{ runner.os }}-vcpkg-bincache-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Restore vcpkg installed tree
        id: cache-vcpkg-installed
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/build-rel/vcpkg_installed
          key: ${{ runner.os }}-vcpkg-installed-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Prepare vcpkg cache directories
        if: runner.os != 'Windows'
        run: |
          mkdir -p "${VCPKG_DEFAULT_BINARY_CACHE}"
          mkdir -p "${VCPKG_DOWNLOADS}"

      - name: Prepare vcpkg cache directories (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null
          New-Item -ItemType Directory -Force -Path $env:VCPKG_DOWNLOADS | Out-Null

      - name: Bootstrap vcpkg (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ ! -d "${{ github.workspace }}/vcpkg/.git" ]; then
            git clone https://github.com/microsoft/vcpkg "${{ github.workspace }}/vcpkg"
          fi
          git -C "${{ github.workspace }}/vcpkg" fetch --depth 1 origin "${VCPKG_COMMIT}"
          git -C "${{ github.workspace }}/vcpkg" checkout --force "${VCPKG_COMMIT}"
          "${{ github.workspace }}/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> "$GITHUB_ENV"

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path "${{ github.workspace }}/vcpkg/.git")) {
            git clone https://github.com/microsoft/vcpkg "${{ github.workspace }}/vcpkg"
          }
          git -C "${{ github.workspace }}/vcpkg" fetch --depth 1 origin "$env:VCPKG_COMMIT"
          git -C "${{ github.workspace }}/vcpkg" checkout --force "$env:VCPKG_COMMIT"
          & "${{ github.workspace }}/vcpkg/bootstrap-vcpkg.bat" -disableMetrics
          "VCPKG_ROOT=${{ github.workspace }}/vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install ECM (Unix)
        if: runner.os != 'Windows'
        run: |
          ECM_PREFIX="${{ github.workspace }}/.cache/ecm"
          ECM_DIR="$ECM_PREFIX/share/ECM/cmake"
          if [ ! -f "$ECM_DIR/ECMConfig.cmake" ]; then
            curl -fL --retry 3 --retry-all-errors \
              "https://github.com/KDE/extra-cmake-modules/archive/refs/tags/v${ECM_VERSION}.tar.gz" \
              -o /tmp/ecm.tar.gz
            rm -rf /tmp/ecm-src /tmp/ecm-build
            mkdir -p /tmp/ecm-src /tmp/ecm-build "$ECM_PREFIX"
            tar -xzf /tmp/ecm.tar.gz -C /tmp/ecm-src --strip-components=1
            cmake -S /tmp/ecm-src -B /tmp/ecm-build -DCMAKE_INSTALL_PREFIX="$ECM_PREFIX"
            cmake --build /tmp/ecm-build --parallel
            cmake --install /tmp/ecm-build
          fi
          test -f "$ECM_DIR/ECMConfig.cmake"
          echo "ECM_DIR=$ECM_DIR" >> "$GITHUB_ENV"

      - name: Install ECM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ecmPrefix = Join-Path "${{ github.workspace }}" ".cache\\ecm"
          $ecmDir = Join-Path $ecmPrefix "share\\ECM\\cmake"
          $ecmConfig = Join-Path $ecmDir "ECMConfig.cmake"
          if (!(Test-Path $ecmConfig)) {
            $archive = Join-Path $env:RUNNER_TEMP "ecm.tar.gz"
            $sourceRoot = Join-Path $env:RUNNER_TEMP "ecm-src"
            $buildRoot = Join-Path $env:RUNNER_TEMP "ecm-build"
            Remove-Item -Recurse -Force $sourceRoot, $buildRoot -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Force -Path $sourceRoot, $buildRoot, $ecmPrefix | Out-Null
            Invoke-WebRequest `
              -Uri "https://github.com/KDE/extra-cmake-modules/archive/refs/tags/v$env:ECM_VERSION.tar.gz" `
              -OutFile $archive
            tar -xzf $archive -C $sourceRoot --strip-components=1
            cmake -S $sourceRoot -B $buildRoot -DCMAKE_INSTALL_PREFIX="$ecmPrefix"
            cmake --build $buildRoot --parallel
            cmake --install $buildRoot
          }
          if (!(Test-Path $ecmConfig)) {
            throw "ECMConfig.cmake not found at $ecmConfig"
          }
          "ECM_DIR=$ecmDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        if: runner.os != 'Windows'
        run: |
          if [ -n "${ECM_DIR:-}" ]; then
            cmake --preset vcpkg-rel -DECM_DIR="$ECM_DIR"
          else
            cmake --preset vcpkg-rel
          fi

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ($env:ECM_DIR) {
            cmake --preset vcpkg-rel "-DECM_DIR=$env:ECM_DIR"
          } else {
            cmake --preset vcpkg-rel
          }

      - name: Save vcpkg binary cache
        if: steps.cache-vcpkg-binary.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
            ${{ env.VCPKG_DOWNLOADS }}
          key: ${{ steps.cache-vcpkg-binary.outputs.cache-primary-key }}

      - name: Save vcpkg installed tree
        if: steps.cache-vcpkg-installed.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/build-rel/vcpkg_installed
          key: ${{ steps.cache-vcpkg-installed.outputs.cache-primary-key }}

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          QT_PREFIX="${{ github.workspace }}/Qt/${{ matrix.qt_version }}/${{ matrix.qt_install_dir }}"
          export LD_LIBRARY_PATH="$QT_PREFIX/lib:${LD_LIBRARY_PATH:-}"
          cmake --build build-rel --parallel

      - name: Build
        if: runner.os != 'Linux'
        run: cmake --build build-rel --parallel

      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: |
          QT_PREFIX="${{ github.workspace }}/Qt/${{ matrix.qt_version }}/${{ matrix.qt_install_dir }}"
          export LD_LIBRARY_PATH="$QT_PREFIX/lib:${LD_LIBRARY_PATH:-}"
          ctest --test-dir build-rel --output-on-failure

      - name: Test
        if: runner.os != 'Linux'
        run: ctest --test-dir build-rel --output-on-failure

      - name: Install to staging (Linux)
        if: runner.os == 'Linux'
        run: |
          QT_PREFIX="${{ github.workspace }}/Qt/${{ matrix.qt_version }}/${{ matrix.qt_install_dir }}"
          export LD_LIBRARY_PATH="$QT_PREFIX/lib:${LD_LIBRARY_PATH:-}"
          cmake --install build-rel --config Release --prefix "${{ github.workspace }}/stage"

      - name: Install to staging
        if: runner.os != 'Linux'
        run: cmake --install build-rel --config Release --prefix "${{ github.workspace }}/stage"

      - name: Download linuxdeploy tools
        if: runner.os == 'Linux'
        run: |
          mkdir -p build-rel/tools
          cd build-rel/tools
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-*.AppImage

      - name: Build AppImage
        if: runner.os == 'Linux'
        run: |
          mkdir -p "${{ github.workspace }}/build-rel/AppDir"
          cmake --install build-rel --config Release --prefix "${{ github.workspace }}/build-rel/AppDir/usr"
          QT_PREFIX="${{ github.workspace }}/Qt/${{ matrix.qt_version }}/${{ matrix.qt_install_dir }}"
          export PATH="$QT_PREFIX/bin:$PATH"
          export LD_LIBRARY_PATH="$QT_PREFIX/lib:${LD_LIBRARY_PATH:-}"
          mkdir -p build-rel/AppDir/usr/plugins/platforms
          cp -av "$QT_PREFIX/plugins/platforms/libqwayland.so" build-rel/AppDir/usr/plugins/platforms/ || true
          cp -av "$QT_PREFIX/plugins/platforms/libqxcb.so" build-rel/AppDir/usr/plugins/platforms/ || true
          build-rel/tools/linuxdeploy-x86_64.AppImage \
            --appdir build-rel/AppDir \
            --executable build-rel/AppDir/usr/bin/tf-gui \
            --desktop-file build-rel/AppDir/usr/share/applications/textfoundry.desktop \
            --icon-file build-rel/AppDir/usr/share/icons/hicolor/scalable/apps/textfoundry.svg \
            --plugin qt \
            --output appimage
          mkdir -p dist
          find . -maxdepth 1 -type f -name '*.AppImage' ! -name 'linuxdeploy*.AppImage' -exec mv {} dist/ \;

      - name: Build RPM
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cpack -G RPM --config build-rel/CPackConfig.cmake -B dist

      - name: Deploy Windows Qt runtime
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stageBin = Join-Path "${{ github.workspace }}\\stage" "bin"
          $guiExe = Join-Path $stageBin "tf-gui.exe"
          if (Test-Path $guiExe) {
            & (Join-Path $env:QT_ROOT_DIR "bin\\windeployqt.exe") `
              --release `
              --compiler-runtime `
              --qmldir "${{ github.workspace }}\\src\\text_foundry_gui\\qml" `
              --no-translations `
              $guiExe
          }
          Copy-Item `
            -Path "${{ github.workspace }}\\build-rel\\vcpkg_installed\\x64-windows\\bin\\*.dll" `
            -Destination $stageBin `
            -Force `
            -ErrorAction SilentlyContinue

      - name: Build macOS DMG
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          APP_BUNDLE="${{ github.workspace }}/stage/tf-gui.app"
          test -d "$APP_BUNDLE"
          macdeployqt "$APP_BUNDLE" -qmldir="${{ github.workspace }}/src/text_foundry_gui/qml" -always-overwrite
          test -d "$APP_BUNDLE/Contents/Frameworks/QtCore.framework"
          test -d "$APP_BUNDLE/Contents/Frameworks/QtGui.framework"
          test -d "$APP_BUNDLE/Contents/Frameworks/QtQml.framework"
          test -d "$APP_BUNDLE/Contents/PlugIns/platforms"
          test -f "$APP_BUNDLE/Contents/PlugIns/platforms/libqcocoa.dylib"
          codesign --force --deep --sign - "$APP_BUNDLE"
          codesign --verify --deep --strict --verbose=2 "$APP_BUNDLE"
          hdiutil create \
            -volname "TextFoundry" \
            -srcfolder "$APP_BUNDLE" \
            -ov \
            -format UDZO \
            "dist/textfoundry-macos.dmg"

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $match = Select-String `
            -Path "${{ github.workspace }}\\CMakeLists.txt" `
            -Pattern 'project\\(TextFoundry VERSION ([0-9.]+)'
          if (-not $match -or $match.Matches.Count -eq 0) {
            throw "Failed to read TextFoundry version from CMakeLists.txt"
          }
          $appVersion = $match.Matches[0].Groups[1].Value
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          & "C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe" `
            "/DMyAppVersion=$appVersion" `
            "/DMySourceDir=${{ github.workspace }}\\stage" `
            "/DMyOutputDir=${{ github.workspace }}\\dist" `
            "${{ github.workspace }}\\packaging\\TextFoundry.iss"

      - name: Upload Linux AppImage
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.appimage_artifact_name }}
          path: dist/*.AppImage
          if-no-files-found: error

      - name: Upload Linux RPM
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rpm_artifact_name }}
          path: dist/*.rpm
          if-no-files-found: error

      - name: Upload macOS package
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.dmg
          if-no-files-found: error

      - name: Upload Windows package
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/textfoundry-windows-setup.exe
          if-no-files-found: error

  publish:
    name: Publish Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        run: |
          APP_VERSION="$(sed -n 's/.*project([^)]*VERSION \([0-9.]\+\).*/\1/p' CMakeLists.txt | head -n 1)"
          if [ -z "$APP_VERSION" ]; then
            echo "Failed to read app version from CMakeLists.txt" >&2
            exit 1
          fi
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$APP_VERSION" >> "$GITHUB_ENV"

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: textfoundry-linux-appimage
          path: release/linux-appimage

      - name: Download Linux RPM artifact
        uses: actions/download-artifact@v4
        with:
          name: textfoundry-linux-rpm
          path: release/linux-rpm

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: textfoundry-macos-dmg
          path: release/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: textfoundry-windows-installer
          path: release/windows

      - name: Normalize release asset names
        run: |
          mkdir -p release/assets
          cp release/linux-appimage/*.AppImage "release/assets/textfoundry-${APP_VERSION}-linux.AppImage"
          cp release/linux-rpm/*.rpm "release/assets/textfoundry-${APP_VERSION}-linux.rpm"
          cp release/macos/*.dmg "release/assets/textfoundry-${APP_VERSION}-macos.dmg"
          cp release/windows/*.exe "release/assets/textfoundry-${APP_VERSION}-windows-setup.exe"
          ls -lah release/assets

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "TextFoundry $APP_VERSION" \
              --generate-notes
          gh release upload "$RELEASE_TAG" release/assets/* --clobber
