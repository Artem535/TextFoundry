name: Fedora RPM

on:
  push:
    branches: ["main", "devel", "devel-qt"]
  pull_request:
    branches: ["main", "devel", "devel-qt"]
  workflow_dispatch:

permissions:
  contents: read

env:
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.cache/vcpkg/archives
  VCPKG_DOWNLOADS: ${{ github.workspace }}/.cache/vcpkg/downloads
  VCPKG_INSTALL_OPTIONS: --debug
  VCPKG_COMMIT: aa2d37682e3318d93aef87efa7b0e88e81cd3d59

jobs:
  build-rpm:
    name: Build Fedora 42 RPM
    runs-on: ubuntu-latest
    container:
      image: fedora:42

    steps:
      - name: Install build dependencies
        run: |
          dnf -y update
          dnf -y install \
            gcc-c++ \
            cmake \
            ninja-build \
            git \
            curl \
            tar \
            gzip \
            unzip \
            pkgconf-pkg-config \
            rpm-build \
            rpmdevtools \
            make \
            which \
            qt6-qtbase-devel \
            qt6-qtdeclarative-devel \
            qt6-qtquickcontrols2-devel \
            qt6-qtsvg-devel \
            qt6-qttools-devel \
            qtkeychain-qt6-devel \
            kf6-syntax-highlighting-devel

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore vcpkg binary cache
        id: cache-vcpkg-binary
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
            ${{ env.VCPKG_DOWNLOADS }}
          key: fedora-42-vcpkg-bincache-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Restore vcpkg installed tree
        id: cache-vcpkg-installed
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/build-rel/vcpkg_installed
          key: fedora-42-vcpkg-installed-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Prepare vcpkg cache directories
        run: |
          cd "$GITHUB_WORKSPACE"
          mkdir -p "${VCPKG_DEFAULT_BINARY_CACHE}"
          mkdir -p "${VCPKG_DOWNLOADS}"

      - name: Bootstrap vcpkg
        run: |
          cd "$GITHUB_WORKSPACE"
          if [ ! -d "$GITHUB_WORKSPACE/vcpkg/.git" ]; then
            git clone https://github.com/microsoft/vcpkg "$GITHUB_WORKSPACE/vcpkg"
          fi
          git -C "$GITHUB_WORKSPACE/vcpkg" fetch --depth 1 origin "${VCPKG_COMMIT}"
          git -C "$GITHUB_WORKSPACE/vcpkg" checkout --force "${VCPKG_COMMIT}"
          "$GITHUB_WORKSPACE/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$GITHUB_WORKSPACE/vcpkg" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          cd "$GITHUB_WORKSPACE"
          NINJA_BIN="$(command -v ninja || command -v ninja-build)"
          test -n "$NINJA_BIN"
          test -f "$GITHUB_WORKSPACE/CMakeLists.txt"
          cmake -S . -B build-rel \
            -G Ninja \
            -DCMAKE_MAKE_PROGRAM="$NINJA_BIN" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DTEXTFOUNDRY_VENDORED_KSYNTAXHIGHLIGHTING=OFF

      - name: Save vcpkg binary cache
        if: steps.cache-vcpkg-binary.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
            ${{ env.VCPKG_DOWNLOADS }}
          key: ${{ steps.cache-vcpkg-binary.outputs.cache-primary-key }}

      - name: Save vcpkg installed tree
        if: steps.cache-vcpkg-installed.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/build-rel/vcpkg_installed
          key: ${{ steps.cache-vcpkg-installed.outputs.cache-primary-key }}

      - name: Build
        run: |
          cd "$GITHUB_WORKSPACE"
          cmake --build build-rel --parallel

      - name: Test
        run: |
          cd "$GITHUB_WORKSPACE"
          ctest --test-dir build-rel --output-on-failure

      - name: Build RPM
        run: |
          cd "$GITHUB_WORKSPACE"
          mkdir -p dist
          cpack -G RPM --config build-rel/CPackConfig.cmake -B dist

      - name: Upload Fedora RPM
        uses: actions/upload-artifact@v4
        with:
          name: textfoundry-fedora-rpm
          path: dist/*.rpm
          if-no-files-found: error
