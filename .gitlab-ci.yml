stages:
  - docs
  - build

variables:
  LANG: C.UTF-8
  LC_ALL: C.UTF-8
  GIT_SUBMODULE_STRATEGY: recursive
  VCPKG_ROOT: "$CI_PROJECT_DIR/.cache/vcpkg"
  VCPKG_DEFAULT_BINARY_CACHE: "$CI_PROJECT_DIR/.cache/vcpkg-bincache"
  CCACHE_DIR: "$CI_PROJECT_DIR/.cache/ccache"
  CCACHE_BASEDIR: "$CI_PROJECT_DIR"
  CCACHE_COMPILERCHECK: "content"

cache:
  key:
    prefix: "rpm-fedora43"
    files:
      - vcpkg.json
      - vcpkg-configuration.json
  paths:
    - .cache/vcpkg
    - .cache/vcpkg-bincache
    - .cache/ccache
    - build-rel/_deps
    - build-rel/vcpkg_installed

build_rpm:
  stage: build
  image: fedora:43
  script:
    - dnf config-manager setopt fedora-cisco-openh264.enabled=0
    - dnf install -y https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-$(rpm -E %fedora).noarch.rpm
    - dnf install -y gcc-c++ clang cmake ninja-build make git rpm-build ccache qt6-qtbase-devel qt6-qtdeclarative-devel qt6-qttools-devel qt6-qtsvg-devel qt6-qtquickcontrols2-devel qt6-qttranslations qt6-linguist extra-cmake-modules qtkeychain-qt6-devel openssl-devel
    - mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE" "$CCACHE_DIR"
    - test -d "$VCPKG_ROOT/.git" || git clone --depth 1 https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
    - "$VCPKG_ROOT/bootstrap-vcpkg.sh"
    - cmake --preset vcpkg-rel --log-level=VERBOSE -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
    - cmake --build build-rel --verbose -j"$(nproc)"
    - cpack --debug --verbose -G RPM --config build-rel/CPackConfig.cmake
  artifacts:
    paths:
      - "*.rpm"
    expire_in: 7 days
  rules:
    - changes:
        - CMakeLists.txt
        - CMakePresets.json
        - cmake/**/*
        - src/**/*
        - tests/**/*
        - examples/**/*
        - vcpkg.json
        - vcpkg-configuration.json
        - .gitlab-ci.yml

build_appimage:
  stage: build
  image: harbor.raftds.com/textfoundry/qt:6.10-ubuntu-clang-pack
  variables:
    DEBIAN_FRONTEND: noninteractive
    APPIMAGE_EXTRACT_AND_RUN: "1"
    QT_PREFIX: "/opt/qt/Qt/6.10.0/clang_64"
    CMAKE_VERSION: "4.2.3"
    CMAKE_DIR: "$CI_PROJECT_DIR/.cache/cmake"
    ECM_VERSION: "6.23.0"
    ECM_PREFIX: "$CI_PROJECT_DIR/.cache/ecm"
    ECM_URL: "https://ftp.funet.fi/pub/mirrors/ftp.kde.org/pub/kde/stable/frameworks/6.23/extra-cmake-modules-6.23.0.tar.xz"
    EXTRA_QT_PLUGINS: "platforms/libqxcb.so"
    EXTRA_QT_MODULES: "waylandclient"
  cache:
    key:
      prefix: "appimage-ubuntu-qt610"
      files:
        - vcpkg.json
        - vcpkg-configuration.json
    paths:
      - .cache/vcpkg
      - .cache/vcpkg-bincache
      - .cache/ccache
      - .cache/cmake
      - .cache/ecm
      - build-rel/_deps
      - build-rel/vcpkg_installed
  script:
    - apt-get update
    - apt-get install -y build-essential clang cmake ninja-build git ccache ca-certificates extra-cmake-modules patchelf file wget curl xz-utils libfuse2 libgl1-mesa-dev libglx-mesa0 mesa-common-dev libx11-dev libxext-dev libxrender-dev libxi-dev libxkbcommon-dev libxkbcommon-x11-dev libwayland-client0 libwayland-cursor0 libwayland-egl1 libxkbcommon0 libdbus-1-3
    - mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE" "$CCACHE_DIR"
    - mkdir -p "$CMAKE_DIR"
    - mkdir -p "$ECM_PREFIX"
    - test -x "$CMAKE_DIR/bin/cmake" || { wget -q "https://github.com/Kitware/CMake/releases/download/v${CMAKE_VERSION}/cmake-${CMAKE_VERSION}-linux-x86_64.tar.gz" -O /tmp/cmake.tar.gz && tar -xzf /tmp/cmake.tar.gz -C "$CMAKE_DIR" --strip-components=1; }
    - export PATH="$CMAKE_DIR/bin:$PATH"
    - cmake --version
    - if [ ! -f "$ECM_PREFIX/share/ECM/cmake/ECMConfig.cmake" ]; then rm -rf /tmp/ecm-src /tmp/ecm-build; fi
    - if [ ! -f "$ECM_PREFIX/share/ECM/cmake/ECMConfig.cmake" ]; then mkdir -p /tmp/ecm-src /tmp/ecm-build; fi
    - if [ ! -f "$ECM_PREFIX/share/ECM/cmake/ECMConfig.cmake" ]; then echo "Downloading ECM from $ECM_URL"; fi
    - if [ ! -f "$ECM_PREFIX/share/ECM/cmake/ECMConfig.cmake" ]; then curl -fL --retry 3 --retry-all-errors --show-error "$ECM_URL" -o /tmp/ecm.tar.xz; fi
    - if [ ! -f "$ECM_PREFIX/share/ECM/cmake/ECMConfig.cmake" ]; then tar -xJf /tmp/ecm.tar.xz -C /tmp/ecm-src --strip-components=1; fi
    - if [ ! -f "$ECM_PREFIX/share/ECM/cmake/ECMConfig.cmake" ]; then cmake -S /tmp/ecm-src -B /tmp/ecm-build -DCMAKE_INSTALL_PREFIX="$ECM_PREFIX"; fi
    - if [ ! -f "$ECM_PREFIX/share/ECM/cmake/ECMConfig.cmake" ]; then cmake --build /tmp/ecm-build -j"$(nproc)"; fi
    - if [ ! -f "$ECM_PREFIX/share/ECM/cmake/ECMConfig.cmake" ]; then cmake --install /tmp/ecm-build; fi
    - test -f "$ECM_PREFIX/share/ECM/cmake/ECMConfig.cmake" || { echo "ECMConfig.cmake not found under $ECM_PREFIX"; find "$ECM_PREFIX" -maxdepth 4 -type f | sort; exit 1; }
    - test -d "$VCPKG_ROOT/.git" || git clone --depth 1 https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
    - "$VCPKG_ROOT/bootstrap-vcpkg.sh"
    - cmake --preset vcpkg-rel --log-level=VERBOSE -DCMAKE_PREFIX_PATH="$ECM_PREFIX;$QT_PREFIX" -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
    - cmake --build build-rel --verbose -j"$(nproc)"
    - rm -rf AppDir
    - DESTDIR="$PWD/AppDir" cmake --install build-rel --prefix /usr
    - mkdir -p AppDir/usr/lib
    - cp -av build-rel/_deps/objectbox-download-src/lib/libobjectbox.so AppDir/usr/lib/
    - |
      if [ -d build-rel/_deps/syntax_highlighting-src/data/syntax ] || [ -d build-rel/_deps/syntax_highlighting-src/data/themes ]; then
        mkdir -p AppDir/usr/share/org.kde.syntax-highlighting
        if [ -d build-rel/_deps/syntax_highlighting-src/data/syntax ]; then
          cp -a build-rel/_deps/syntax_highlighting-src/data/syntax AppDir/usr/share/org.kde.syntax-highlighting/
        fi
        if [ -d build-rel/_deps/syntax_highlighting-src/data/themes ]; then
          cp -a build-rel/_deps/syntax_highlighting-src/data/themes AppDir/usr/share/org.kde.syntax-highlighting/
        fi
      fi
    - mkdir -p AppDir/usr/plugins/platforms
    - cp -av "$QT_PREFIX/plugins/platforms/libqxcb.so" AppDir/usr/plugins/platforms/
    - cp -av "$QT_PREFIX/plugins/platforms/"libqwayland*.so AppDir/usr/plugins/platforms/ || true
    - printf '%s\n' '#!/bin/sh' 'HERE="$(dirname "$(readlink -f "$0")")"' 'export QT_QPA_PLATFORM="${QT_QPA_PLATFORM:-xcb}"' 'export XDG_DATA_DIRS="$HERE/usr/share${XDG_DATA_DIRS:+:$XDG_DATA_DIRS}"' 'QML_IMPORTS="$HERE/usr/qml"' 'for dir in "$HERE/usr/lib/qt6/qml" "$HERE/usr/lib/x86_64-linux-gnu/qt6/qml" "$HERE/usr/lib64/qt6/qml"; do' '  if [ -d "$dir" ]; then' '    QML_IMPORTS="$QML_IMPORTS:$dir"' '  fi' 'done' 'export QML2_IMPORT_PATH="$QML_IMPORTS${QML2_IMPORT_PATH:+:$QML2_IMPORT_PATH}"' 'exec "$HERE/usr/bin/tf-gui" "$@"' > AppDir/AppRun
    - chmod +x AppDir/AppRun
    - wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
    - wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
    - chmod +x linuxdeploy-*.AppImage
    - export PATH="$QT_PREFIX/bin:$PATH"
    - export LD_LIBRARY_PATH="$QT_PREFIX/lib:${LD_LIBRARY_PATH:-}"
    - export QML_SOURCES_PATHS="$CI_PROJECT_DIR/src/text_foundry_gui/qml"
    - export QML2_IMPORT_PATH="$QT_PREFIX/qml"
    - ./linuxdeploy-x86_64.AppImage --appdir AppDir --executable AppDir/usr/bin/tf-gui --desktop-file AppDir/usr/share/applications/textfoundry.desktop --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/textfoundry.svg --plugin qt --output appimage
    - ls -lah *.AppImage
  artifacts:
    paths:
      - "*.AppImage"
    expire_in: 7 days
  rules:
    - changes:
        - CMakeLists.txt
        - CMakePresets.json
        - cmake/**/*
        - src/**/*
        - tests/**/*
        - examples/**/*
        - vcpkg.json
        - vcpkg-configuration.json
        - .gitlab-ci.yml

pages:
  stage: docs
  image: node:22-bookworm
  script:
    - npm install
    - npm run docs:build
    - mkdir -p public/presentation
    - cp doc/modules/ROOT/assets/attachments/textfoundry-intro-onepager.html public/presentation/index.html
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
      changes:
        - doc/**/*
        - antora-playbook.yml
        - package.json
        - package-lock.json
        - scripts/sync_antora_docs.sh
