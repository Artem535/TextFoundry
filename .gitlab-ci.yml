stages:
  - build
  - pages

variables:
  LANG: C.UTF-8
  LC_ALL: C.UTF-8
  GIT_SUBMODULE_STRATEGY: recursive
  VCPKG_ROOT: "$CI_PROJECT_DIR/.cache/vcpkg"

build_rpm:
  stage: build
  image: fedora:43
  script:
    - dnf config-manager setopt fedora-cisco-openh264.enabled=0
    - dnf install -y https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-$(rpm -E %fedora).noarch.rpm
    - dnf install -y gcc-c++ clang cmake ninja-build make git rpm-build ccache qt6-qtbase-devel qt6-qtdeclarative-devel qt6-qttools-devel qt6-qtsvg-devel qt6-qtquickcontrols2-devel qt6-qttranslations qt6-linguist extra-cmake-modules qtkeychain-qt6-devel openssl-devel
    - test -d "$VCPKG_ROOT/.git" || git clone --depth 1 https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
    - "$VCPKG_ROOT/bootstrap-vcpkg.sh"
    - cmake --preset vcpkg-rel --log-level=VERBOSE
    - cmake --build build-rel --verbose -j"$(nproc)"
    - cpack --debug --verbose -G RPM --config build-rel/CPackConfig.cmake
  artifacts:
    paths:
      - "*.rpm"
    expire_in: 7 days

pages:
  stage: pages
  image: asciidoctor/docker-asciidoctor:main
  script:
    - mkdir public
    - cd public
    - asciidoctor ../doc/main.adoc -o index.html
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
